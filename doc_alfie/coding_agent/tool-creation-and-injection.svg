<svg viewBox="0 0 1240 880" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace; }
    .title { fill: #f8fafc; font-size: 17px; font-weight: 700; }
    .subtitle { fill: #94a3b8; font-size: 10px; }
    .panel-title { fill: #f8fafc; font-size: 13px; font-weight: 700; }
    .box-title { fill: #f8fafc; font-size: 11px; font-weight: 700; text-anchor: middle; }
    .box-sub { fill: #94a3b8; font-size: 8px; text-anchor: middle; }
    .tiny { fill: #cbd5e1; font-size: 8px; text-anchor: middle; }
    .note { fill: #e2e8f0; font-size: 8px; }
    .muted { fill: #94a3b8; font-size: 8px; }
    .seq-label { fill: #e2e8f0; font-size: 8px; text-anchor: middle; }
    .seq-return { fill: #94a3b8; font-size: 8px; text-anchor: middle; font-style: italic; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="32" y="34" class="title">Tool Creation and Injection into Agent / LLM</text>
  <text x="32" y="52" class="subtitle">Built-in and extension ToolDefinitions become active AgentTools, then flow into the provider request as Context.tools.</text>

  <rect x="24" y="78" width="1192" height="320" rx="12" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="42" y="101" class="panel-title">Panel A: creation and injection path</text>

  <rect x="62" y="136" width="138" height="68" rx="6" fill="#0f172a"/>
  <rect x="62" y="136" width="138" height="68" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="131" y="162" class="box-title">Tool files</text>
  <text x="131" y="178" class="box-sub">read/bash/edit/write</text>
  <text x="131" y="190" class="box-sub">grep/find/ls</text>

  <rect x="244" y="136" width="158" height="68" rx="6" fill="#0f172a"/>
  <rect x="244" y="136" width="158" height="68" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="323" y="162" class="box-title">createAllToolDefinitions</text>
  <text x="323" y="178" class="box-sub">collects built-ins</text>
  <text x="323" y="190" class="box-sub">as ToolDefinition objects</text>

  <rect x="452" y="136" width="158" height="68" rx="6" fill="#0f172a"/>
  <rect x="452" y="136" width="158" height="68" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="531" y="162" class="box-title">_buildRuntime()</text>
  <text x="531" y="178" class="box-sub">adds cwd settings</text>
  <text x="531" y="190" class="box-sub">and shell/read options</text>

  <rect x="660" y="136" width="158" height="68" rx="6" fill="#0f172a"/>
  <rect x="660" y="136" width="158" height="68" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="739" y="162" class="box-title">_refreshToolRegistry()</text>
  <text x="739" y="178" class="box-sub">merge built-in + extension</text>
  <text x="739" y="190" class="box-sub">+ SDK custom tools</text>

  <rect x="868" y="136" width="142" height="68" rx="6" fill="#0f172a"/>
  <rect x="868" y="136" width="142" height="68" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="939" y="162" class="box-title">setActiveToolsByName</text>
  <text x="939" y="178" class="box-sub">writes</text>
  <text x="939" y="190" class="box-sub">agent.state.tools</text>

  <rect x="1060" y="136" width="122" height="68" rx="6" fill="#0f172a"/>
  <rect x="1060" y="136" width="122" height="68" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="1121" y="162" class="box-title">Agent state</text>
  <text x="1121" y="178" class="box-sub">active tools array</text>
  <text x="1121" y="190" class="box-sub">copied on assign</text>

  <line x1="200" y1="170" x2="238" y2="170" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <line x1="402" y1="170" x2="446" y2="170" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="610" y1="170" x2="654" y2="170" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="818" y1="170" x2="862" y2="170" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1010" y1="170" x2="1054" y2="170" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="166" y="264" width="176" height="62" rx="6" fill="#0f172a"/>
  <rect x="166" y="264" width="176" height="62" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="254" y="288" class="box-title">CLI / SDK options</text>
  <text x="254" y="304" class="box-sub">--tools, --no-tools</text>
  <text x="254" y="316" class="box-sub">customTools, noTools</text>

  <rect x="424" y="264" width="180" height="62" rx="6" fill="#0f172a"/>
  <rect x="424" y="264" width="180" height="62" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="514" y="288" class="box-title">Active / allowed names</text>
  <text x="514" y="304" class="box-sub">default: read,bash,edit,write</text>
  <text x="514" y="316" class="box-sub">filter: allowedToolNames</text>

  <rect x="686" y="264" width="168" height="62" rx="6" fill="#0f172a"/>
  <rect x="686" y="264" width="168" height="62" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="770" y="288" class="box-title">Prompt metadata</text>
  <text x="770" y="304" class="box-sub">promptSnippet</text>
  <text x="770" y="316" class="box-sub">promptGuidelines</text>

  <rect x="942" y="264" width="176" height="62" rx="6" fill="#0f172a"/>
  <rect x="942" y="264" width="176" height="62" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="1030" y="288" class="box-title">System prompt</text>
  <text x="1030" y="304" class="box-sub">rebuilt to describe</text>
  <text x="1030" y="316" class="box-sub">active tool behavior</text>

  <line x1="342" y1="295" x2="418" y2="295" stroke="#fbbf24" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="604" y1="295" x2="680" y2="295" stroke="#fbbf24" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="854" y1="295" x2="936" y2="295" stroke="#a78bfa" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M 514 264 C 560 220, 875 220, 939 264" fill="none" stroke="#fbbf24" stroke-width="1.1" stroke-dasharray="6,4"/>

  <rect x="24" y="428" width="1192" height="410" rx="12" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="42" y="451" class="panel-title">Panel B: request and tool-call sequence</text>

  <g id="seq-actors">
    <rect x="56" y="488" width="122" height="44" rx="6" fill="#0f172a"/>
    <rect x="56" y="488" width="122" height="44" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="117" y="515" class="box-title">AgentSession</text>
    <line x1="117" y1="532" x2="117" y2="802" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

    <rect x="258" y="488" width="122" height="44" rx="6" fill="#0f172a"/>
    <rect x="258" y="488" width="122" height="44" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="319" y="515" class="box-title">Agent</text>
    <line x1="319" y1="532" x2="319" y2="802" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

    <rect x="460" y="488" width="122" height="44" rx="6" fill="#0f172a"/>
    <rect x="460" y="488" width="122" height="44" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
    <text x="521" y="515" class="box-title">AgentLoop</text>
    <line x1="521" y1="532" x2="521" y2="802" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

    <rect x="662" y="488" width="122" height="44" rx="6" fill="#0f172a"/>
    <rect x="662" y="488" width="122" height="44" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="723" y="515" class="box-title">AI Context</text>
    <line x1="723" y1="532" x2="723" y2="802" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

    <rect x="864" y="488" width="122" height="44" rx="6" fill="#0f172a"/>
    <rect x="864" y="488" width="122" height="44" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="925" y="515" class="box-title">Provider</text>
    <line x1="925" y1="532" x2="925" y2="802" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

    <rect x="1066" y="488" width="122" height="44" rx="6" fill="#0f172a"/>
    <rect x="1066" y="488" width="122" height="44" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
    <text x="1127" y="515" class="box-title">Tool execute</text>
    <line x1="1127" y1="532" x2="1127" y2="802" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  </g>

  <line x1="117" y1="570" x2="319" y2="570" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="218" y="560" class="seq-label">1. set active AgentTools</text>
  <rect x="314" y="560" width="10" height="34" rx="2" fill="rgba(59,130,246,0.4)" stroke="#60a5fa"/>

  <line x1="319" y1="622" x2="521" y2="622" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="420" y="612" class="seq-label">2. createContextSnapshot()</text>
  <rect x="516" y="612" width="10" height="72" rx="2" fill="rgba(6,78,59,0.45)" stroke="#34d399"/>

  <line x1="521" y1="662" x2="723" y2="662" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="622" y="652" class="seq-label">3. Context { messages, tools }</text>

  <line x1="723" y1="704" x2="925" y2="704" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="824" y="694" class="seq-label">4. convert tools to API schema</text>
  <rect x="920" y="694" width="10" height="44" rx="2" fill="rgba(120,53,15,0.45)" stroke="#fbbf24"/>

  <line x1="925" y1="748" x2="521" y2="748" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="723" y="738" class="seq-return">5. assistant toolCall(name,args)</text>

  <line x1="521" y1="780" x2="1127" y2="780" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="824" y="770" class="seq-label">6. validate args, hooks, tool.execute()</text>
  <rect x="1122" y="770" width="10" height="32" rx="2" fill="rgba(136,19,55,0.45)" stroke="#fb7185"/>

  <path d="M 1127 812 C 960 846, 690 846, 521 812" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="824" y="834" class="seq-return">7. toolResult is appended, loop continues</text>
</svg>
